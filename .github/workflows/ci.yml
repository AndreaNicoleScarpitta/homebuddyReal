name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: home_buddy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/home_buddy
      NODE_ENV: test
      PORT: 5000
      SESSION_SECRET: ci-test-secret-not-for-production
      ALLOW_TEST_USER_HEADER: "1"
      AI_INTEGRATIONS_OPENAI_API_KEY: sk-test-ci-placeholder-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:push
      - name: Apply event_log immutability trigger (not created by db:push)
        run: psql "$DATABASE_URL" -f migrations/0001_event_log_immutability_trigger.sql
      - name: Start server for integration tests
        run: npx tsx server/index.ts &
      - name: Wait for server to be ready
        run: npx wait-on http://localhost:5000/api/health --timeout 90000
      - run: npx vitest run --reporter=verbose

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: home_buddy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/home_buddy
      NODE_ENV: development
      PORT: 5000
      SESSION_SECRET: ci-e2e-secret-not-for-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run db:push
      - run: npm run build
      - name: Start server & run E2E tests
        run: |
          set +e
          NODE_ENV=production node dist/index.cjs > server.log 2>&1 &
          SERVER_PID=$!
          echo "Server started with PID: $SERVER_PID"

          npx wait-on http://localhost:5000/api/health --timeout 60000
          WAIT_ON_EXIT=$?
          echo "--- wait-on exited with $WAIT_ON_EXIT ---"

          echo "--- Manual health probe ---"
          HEALTH_OUT=$(curl -sS -i http://localhost:5000/api/health 2>&1 || echo "curl failed")
          echo "$HEALTH_OUT"

          # Capture playwright output regardless of wait-on result
          PW_OUT=""
          PW_EXIT=99
          if [ "$WAIT_ON_EXIT" -eq 0 ]; then
            echo "--- Running playwright ---"
            PW_OUT=$(npx playwright test --reporter=list 2>&1)
            PW_EXIT=$?
            echo "$PW_OUT"
          fi

          # Upload combined diagnostic to a public paste service (0x0.st)
          {
            echo "=== wait-on exit: $WAIT_ON_EXIT ==="
            echo "=== playwright exit: $PW_EXIT ==="
            echo ""
            echo "=== Health probe ==="
            echo "$HEALTH_OUT"
            echo ""
            echo "=== Server log (full) ==="
            cat server.log 2>/dev/null || echo "(no server.log)"
            echo ""
            echo "=== Playwright output ==="
            echo "$PW_OUT"
          } > /tmp/e2e-diag.txt

          PASTE_URL=$(curl -sS -F'file=@/tmp/e2e-diag.txt' https://0x0.st 2>/dev/null || echo "")
          if [ -z "$PASTE_URL" ]; then
            PASTE_URL=$(curl -sS --upload-file /tmp/e2e-diag.txt https://transfer.sh/e2e-diag.txt 2>/dev/null || echo "")
          fi
          # Annotations are public via the check-runs annotations API
          echo "::error title=E2E Diagnostic::Paste URL: $PASTE_URL  (wait-on=$WAIT_ON_EXIT pw=$PW_EXIT)"

          # Also dump the last 80 lines of the server log as annotations
          # (each annotation max 4KB; we use a few)
          tail -80 server.log 2>/dev/null | awk '{print "::warning::SRV "$0}' || true

          if [ "$WAIT_ON_EXIT" -ne 0 ]; then exit 1; fi
          exit $PW_EXIT
      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-server-log
          path: server.log
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
